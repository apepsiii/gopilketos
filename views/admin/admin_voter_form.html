{{define "admin_voter_form.html"}}{{template "admin_layout" .}}{{end}}

{{define "admin_voter_form_content"}}
<section class="max-w-3xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200/70 p-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">Tambah Pemilih</h1>
        <p class="text-slate-500 mt-2">Tambahkan data pemilih yang berhak menggunakan sistem e-voting.</p>
    </div>
    <form method="POST" action="/admin/voters/save" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <label class="block">
                <span class="text-sm font-semibold text-slate-700">Nama</span>
                <input type="text" name="name" required class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
            </label>
            <label class="block">
                <span class="text-sm font-semibold text-slate-700">Kelas</span>
                <input type="text" name="class_name" required class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
            </label>
        </div>
        <label class="block">
            <span class="text-sm font-semibold text-slate-700">Nomor HP</span>
            <input type="text" name="phone_number" required class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
        </label>
        <div class="flex flex-col sm:flex-row sm:justify-end sm:items-center gap-3 pt-4 border-t border-slate-200">
            <a href="/admin/voters" class="px-6 py-3 rounded-3xl border border-slate-300 text-slate-700 hover:bg-slate-100">Batal</a>
            <button type="submit" class="px-6 py-3 rounded-3xl bg-[#3525CD] text-white font-semibold hover:bg-[#2c1fa9]">Simpan</button>
        </div>
    </form>
</section>
{{end}}
