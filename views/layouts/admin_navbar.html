{{define "admin_navbar"}}
<header class="bg-white/80 sticky top-0 z-40 shadow-sm backdrop-blur-xl border-b border-slate-200">
    <div class="flex items-center justify-between px-8 py-4">
        <div>
            <p class="text-xs uppercase tracking-widest text-primary font-bold">{{.PageSubtitle}}</p>
            <h1 class="text-3xl font-bold text-on-background">{{.PageTitle}}</h1>
        </div>
        <div class="flex gap-3">
            <button class="px-5 py-2.5 bg-slate-100 rounded-lg text-sm font-semibold flex items-center gap-2"><span class="material-symbols-outlined text-sm">download</span>Export</button>
            <button class="px-5 py-2.5 bg-gradient-to-br from-[#3525CD] to-[#4F46E5] text-white rounded-lg text-sm font-semibold flex items-center gap-2"><span class="material-symbols-outlined text-sm">rocket_launch</span>Live</button>
        </div>
    </div>
</header>
